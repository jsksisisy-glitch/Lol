<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Ti</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
background:linear-gradient(#ffc0cb,#d291ff);
text-align:center;
}

h1{
color:white;
font-size:40px;
}

.ramo{
width:250px;
margin-top:20px;
animation:flotar 3s infinite ease-in-out;
}

@keyframes flotar{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

</style>
</head>

<body>

<h1>🌷 Para Ti 🌷</h1>

<img class="ramo" src="Tulipanes.jpg">

<p>Un ramo de tulipanes para una persona especial 💜</p>

</body>
</html>
