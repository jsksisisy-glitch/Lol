<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Ti</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
background:linear-gradient(#ffc0cb,#d291ff);
text-align:center;
overflow:hidden;
}

h1{
color:white;
font-size:40px;
}

.ramo{
width:250px;
margin-top:20px;
animation:flotar 3s infinite ease-in-out;
}

/* animación de flotación */
@keyframes flotar{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

/* corazones flotando */
.corazon{
position:absolute;
font-size:24px;
color:#ff4da6;
animation:subir 6s linear infinite;
}

@keyframes subir{
0%{transform:translateY(100vh); opacity:1;}
100%{transform:translateY(-10vh); opacity:0;}
}

/* tulipanes sorpresa */
.flor{
position:absolute;
font-size:28px;
animation:caer 4s linear forwards;
}

@keyframes caer{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}
</style>
</head>

<body>

<h1 id="titulo"></h1>

<img class="ramo" src="Tulipanes.jpg">

<p>Un ramo de tulipanes para una persona especial 💜</p>

<script>
// texto letra por letra
let texto = "🌷 Para Ti 🌷";
let i = 0;
function escribir(){
  if(i < texto.length){
    document.getElementById("titulo").innerHTML += texto.charAt(i);
    i++;
    setTimeout(escribir, 80);
  }
}
escribir();

// corazones flotando
function crearCorazon(){
  let c = document.createElement("div");
  c.className = "corazon";
  c.innerHTML = "💜";
  c.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(c);
  setTimeout(()=>{c.remove();},6000);
}
setInterval(crearCorazon, 600);

// tulipanes sorpresa al tocar
function crearFlor(event){
  let f = document.createElement("div");
  f.className = "flor";
  f.innerHTML = "🌷";
  f.style.left = event.clientX + "px";
  f.style.top = event.clientY + "px";
  document.body.appendChild(f);
  setTimeout(()=>{f.remove();},4000);
}
document.body.addEventListener("click", crearFlor);
</script>

</body>
</html>
